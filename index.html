<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>My Startup App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #333; margin-bottom: 10px; }
        .value { font-size: 2.5rem; color: #6200ee; font-weight: bold; margin: 20px 0; }
        .points-box { color: #666; margin-bottom: 30px; }
        button { background: #6200ee; color: white; border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s; width: 100%; }
        button:hover { background: #4b00b4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Здравей, Доника!</h1>
        <div class="points-box">Твоите точки: <span id="points-display">0</span></div>
        <div class="value" id="value-display">0$</div>
        <p style="color: #888; font-size: 0.9rem;">Пазарна стойност</p>
        <button onclick="izpratiDannite()">Добави точки</button>

    <script src="script.js"></script><button onclick="izpratiDannite()">Добави точки</button>
</body>
</html>
